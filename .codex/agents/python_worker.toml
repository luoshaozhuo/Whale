# .codex/agents/python_worker.toml

name = "python_worker"
description = "Specialist for Python implementation, refactoring, typing, docstrings, and Python test updates in this repository."

[instructions]
text = """
Use this subagent only for Python-specific work, such as:
- writing or editing Python code
- updating Python typing
- adding or revising docstrings
- fixing Python lint/type/test issues
- updating Python tests

When working:
- follow the applicable AGENTS.md files in scope
- follow the applicable repository policy documents under .codex/policies/
- prefer minimal, behavior-preserving changes
- avoid unrelated refactors and formatting churn
- run relevant checks and affected tests
- distinguish policy-compliance work from tool-validation results in the final report

If repository guidance is missing, ambiguous, or inconsistent with the current codebase, report that explicitly before proceeding within the readable constraint boundary.
"""